<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Control Center</title>
  <meta name="description" content="Family Control Center">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body data-page="dashboard">
  <div class="site-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <a class="brand" href="index.html">
          <span class="brand-mark">FC</span>
          <div>
            <span class="brand-title" id="brandTitle">Loading</span>
            <span class="brand-subtitle" id="brandSubtitle">Loading</span>
          </div>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="sidebar-nav" id="primary-nav" aria-label="Primary navigation"></nav>
      <section class="sidebar-panel">
        <p class="eyebrow" id="sidebarEyebrow">Loading</p>
        <strong id="readinessScore">Loading</strong>
        <p id="readinessText">Syncing household status</p>
      </section>
    </aside>

    <main class="main-content">
      <header class="dashboard-header" aria-label="Dashboard overview">
        <h1 id="heroTitle">Loading</h1>
        <p class="dashboard-subtitle" id="heroCopy">Loading</p>
      </header>

      <section class="dashboard-grid dashboard-grid-compact" aria-label="Dashboard sections">
        <div class="summary-grid compact-grid" id="dashboardCards"></div>
      </section>
    </main>
  </div>

  <script src="data/site-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
