<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Control Center</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#0F172A;
color:white;
margin:0;
}

.header{
padding:40px;
text-align:center;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:24px;
padding:40px;
}

.card{
background:#1E293B;
padding:24px;
border-radius:12px;
text-decoration:none;
color:white;
}

.card:hover{
background:#334155;
}

</style>

</head>

<body>

<div class="header">
<h1>Family Control Center</h1>
<p>Household financial dashboard</p>
</div>

<div class="dashboard">

<a class="card">Accounts</a>
<a class="card">Insurance</a>
<a class="card">Contacts</a>
<a class="card">Documents</a>
<a class="card">Emergency</a>

</div>

</body>
</html>
