<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Control Center</title>
  <meta name="description" content="Family Control Center">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body data-page="emergency">
  <div class="site-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <a class="brand" href="index.html">
          <span class="brand-mark">FC</span>
          <div>
            <span class="brand-title" id="brandTitle">Loading</span>
            <span class="brand-subtitle" id="brandSubtitle">Loading</span>
          </div>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="sidebar-nav" id="primary-nav" aria-label="Primary navigation"></nav>
      <section class="sidebar-panel">
        <p class="eyebrow" id="sidebarEyebrow">Loading</p>
        <strong id="pageAsideTitle">Loading</strong>
        <p id="pageAsideText">Preparing emergency overview</p>
      </section>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <p class="eyebrow" id="pageEyebrow">Loading</p>
        <h1 id="pageTitle">Loading</h1>
        <p class="hero-copy" id="pageCopy">Loading</p>
      </header>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="statsEyebrow">Loading</p>
            <h2 id="statsTitle">Loading</h2>
          </div>
        </div>
        <div class="stats-grid" id="emergencyStats"></div>
      </section>

      <section class="detail-grid">
        <article class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="actionsEyebrow">Loading</p>
              <h2 id="actionsTitle">Loading</h2>
            </div>
          </div>
          <div id="emergencyActions"></div>
        </article>

        <article class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="preparednessEyebrow">Loading</p>
              <h2 id="preparednessTitle">Loading</h2>
            </div>
          </div>
          <div id="emergencyPreparedness"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="data/site-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
